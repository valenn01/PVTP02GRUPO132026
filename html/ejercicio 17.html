<!DOCTYPE html>
<html lang="es">
    <head>
     <meta charset="UTF-8">
      <title>Ejercicio 17 - contarLetraA</title>
    </head>
  <body>
        <script>



            function contarLetraA(texto) {
              let contador = 0;
               for (let i = 0; i < texto.length; i++) {
                  if (texto[i] === "a") {
                 contador++; 
                }
        
               }
        return 'La palabra "${texto}" contiene ${contador} letras "a" ';
            }
          //Ejemplos//
            document.write(contarLetraA("banana") + "<br>"); //resultado: 3//
            document.write(contarLetraA("caramelo") + "<br>"); //resultado: 2//
            document.write(contarLetraA("queso") + "<br>"); //resultado: 0//
        </script>
    </body>         
</html>
